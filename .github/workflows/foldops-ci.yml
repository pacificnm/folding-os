name: FoldOps

on:
  push:
    branches: [main]
    paths:
      - 'packages/foldops/**'
      - 'scripts/build-foldops-bundles'
      - '.github/workflows/foldops-ci.yml'
  pull_request:
    paths:
      - 'packages/foldops/**'
      - 'scripts/build-foldops-bundles'
      - '.github/workflows/foldops-ci.yml'

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/foldops
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt --check
      - name: cargo test
        run: cargo test --workspace
      - name: cargo build release
        run: cargo build --release -p foldops-agent -p foldops-supervisor

  bundles:
    name: Layout bundles
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: packages/foldops/web/package-lock.json
      - name: Build layout bundles
        run: ./scripts/build-foldops-bundles --manifest-release ci-test
      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: foldops-layout-bundles-ci-test
          path: build/output/foldops/ci-test/
