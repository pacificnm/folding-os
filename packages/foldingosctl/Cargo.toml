[package]
name = "foldingosctl"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
license = "GPL-3.0-only"
description = "FoldingOS appliance control plane"

[[bin]]
name = "foldingosctl"
path = "src/main.rs"

[dependencies]
getrandom = "0.2"
goblin = "0.9"
nix = { version = "0.29", features = ["user", "fs"] }
rcgen = "0.13"
regex = "1"
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
rustls-pemfile = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tar = "0.4"
url = "2"
ureq = { version = "2.12", default-features = false, features = ["tls", "json"] }
users = "0.11"
xz2 = "0.1"
zstd = "0.13"

[dev-dependencies]
serde_json = "1"
