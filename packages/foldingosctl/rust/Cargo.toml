[package]
name = "foldingosctl"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
license = "GPL-3.0-only"
description = "FoldingOS appliance control plane (Rust migration)"

[[bin]]
name = "foldingosctl-rust"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
serde_json = "1"
