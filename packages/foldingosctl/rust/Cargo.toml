[package]
name = "foldingosctl"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
license = "GPL-3.0-only"
description = "FoldingOS appliance control plane (Rust migration)"

[[bin]]
name = "foldingosctl-rust"
path = "src/main.rs"

[dependencies]
getrandom = "0.2"
nix = { version = "0.29", features = ["user", "fs"] }
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
url = "2"
ureq = { version = "2.12", default-features = false, features = ["tls", "json"] }
users = "0.11"

[dev-dependencies]
serde_json = "1"
