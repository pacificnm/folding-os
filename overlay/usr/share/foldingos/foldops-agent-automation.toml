# FoldOps agent automation policy.
# See ADR-0020 and Milestone 4 engineering spec (Remote Configuration).

schema_version = 1
service_user = "foldops"
installation_role = "agent"

[[commands]]
group = "config"
name = "activate"

[[commands]]
group = "config"
name = "set-passkey"

[[commands]]
group = "foldops"
name = "acquire"

[[commands]]
group = "tools"
name = "acquire"

[[commands]]
group = "provision"
name = "sync-software-assignments"
