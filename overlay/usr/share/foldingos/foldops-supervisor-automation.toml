# FoldOps supervisor automation policy.
# See ADR-0024: doc/adr/0024-foldops-supervisor-fleet-mutation-authorization.md

schema_version = 1
service_user = "foldops"
installation_role = "supervisor"

[[commands]]
group = "provision"
name = "assign"

[[commands]]
group = "provision"
name = "allow-boot"

[[commands]]
group = "foldops"
name = "acquire"

[[commands]]
group = "tools"
name = "acquire"

[[commands]]
group = "recovery"
name = "export"

[[commands]]
group = "recovery"
name = "import"
