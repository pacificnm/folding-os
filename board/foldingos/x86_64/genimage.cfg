image efi-part.vfat {
	vfat {
		label = "FOLDING_EFI"
		extraargs = "--invariant -i 464F5345"

		file EFI {
			image = "efi-part/EFI"
		}

		file boot {
			image = "efi-part/boot"
		}

		file foldingos {
			image = "efi-part/foldingos"
		}
	}

	size = 512M
}

image foldingos-x86_64.img {
	hdimage {
		partition-table-type = "gpt"
		disk-uuid = "464f4c44-494e-474f-5344-49534b000001"
	}

	partition FOLDINGOS_EFI {
		partition-type-uuid = U
		partition-uuid = "464f4c44-494e-474f-5345-464900000001"
		image = "efi-part.vfat"
		offset = 1M
		size = 512M
	}

	partition FOLDINGOS_ROOT {
		partition-type-uuid = root-x86-64
		partition-uuid = "464f4c44-494e-474f-5352-4f4f54000001"
		image = "rootfs.ext4"
		size = 2G
	}

	partition FOLDINGOS_DATA {
		partition-type-uuid = L
		partition-uuid = "464f4c44-494e-474f-5344-415441000001"
		image = "data.ext4"
		size = 1534M
	}

	size = 4G
}
